<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      .edge { stroke: #1a1a2e; stroke-width: 0.5; }
      .face { fill: #4ecdc4; stroke: #1a1a2e; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Icosahedron projected from isometric view -->
  <!-- Top pyramid (5 triangular faces) -->
  <polygon class="face" points="16,4 21,8 16,10" />
  <polygon class="face" points="16,4 16,10 11,8" />
  <polygon class="face" points="16,4 19,6 14,6" />

  <!-- Upper middle band (5 faces) -->
  <polygon class="face" points="21,8 26,10 23,14" />
  <polygon class="face" points="11,8 14,12 6,10" />
  <polygon class="face" points="16,10 21,8 19,14" />
  <polygon class="face" points="16,10 11,8 13,14" />

  <!-- Middle section (5 faces) -->
  <polygon class="face" points="21,14 26,16 24,20" />
  <polygon class="face" points="11,14 8,18 6,14" />
  <polygon class="face" points="16,12 21,14 18,18" />
  <polygon class="face" points="16,12 11,14 14,18" />

  <!-- Lower middle band (5 faces) -->
  <polygon class="face" points="24,20 26,24 20,26" />
  <polygon class="face" points="8,20 6,24 12,26" />
  <polygon class="face" points="18,18 21,22 16,24" />
  <polygon class="face" points="14,18 11,22 16,24" />

  <!-- Bottom pyramid (5 triangular faces) -->
  <polygon class="face" points="20,26 16,28 12,26" />
  <polygon class="face" points="16,24 18,24 16,28" />
  <polygon class="face" points="16,24 14,24 16,28" />
</svg>
